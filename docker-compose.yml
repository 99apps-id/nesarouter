services:
  nesa-router:
    build:
      context: .
    image: nesa-router:local
    container_name: nesa-router
    restart: unless-stopped
    ports:
      - "20129:20129"
    volumes:
      - nesa-router-data:/app/data
    env_file:
      - .env
    environment:
      PORT: "20129"
      HOSTNAME: "0.0.0.0"
      DATA_DIR: /app/data
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:20129/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  nesa-router-data:
    name: nesa-router-data
